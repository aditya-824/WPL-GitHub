<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p id="demo"></p>
    <script>
      const myPara = document.getElementById("demo");
      myPara.innerHTML = "Hello World!";
    </script>

    <p id="example">Hello, world!</p>
    <br />
    <p>Welcome</p>
    <button onclick="changeText()">Click me</button>
    <script>
      function changeText() {
        document.getElementById("example").innerHTML = "Text changed!";
      }

      <p id="demo1"></p>;
      const myPara = document.getElementById("demo1");
      myPara.innerHTML = "This is paragraph 1";
    </script>
  </body>
</html>
